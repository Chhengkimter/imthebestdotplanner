<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✿ My Dashboard ✿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --pink-1:#fce8f0;--pink-2:#f5c8dc;--pink-3:#e89abf;--pink-4:#c96090;
  --lav-1:#f0ecfc;--lav-2:#dcd4f8;--lav-3:#b8a8ec;--lav-4:#8068d0;--lav-5:#5840a8;
  --green-1:#e8f5ee;--green-2:#c4e4d0;--green-3:#88c8a4;--green-4:#48a872;
  --cream:#faf8f4;--cream-2:#f2ede4;--cream-3:#e0d8c8;--cream-4:#c8bca8;
  --white:#ffffff;
  --text-1:#2a2230;--text-2:#5a5070;--text-3:#9088a8;--text-4:#c0b8d0;
  --shadow-sm:0 2px 8px rgba(90,70,120,0.09);
  --shadow-md:0 4px 20px rgba(90,70,120,0.12);
  --shadow-lg:0 8px 40px rgba(90,70,120,0.14);
  --radius-sm:8px;--radius:14px;--radius-lg:22px;
  --nav-h:60px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--cream);
  color:var(--text-1);
  min-height:100vh;
  background-image:
    radial-gradient(ellipse at 0% 0%,rgba(220,212,248,.45) 0%,transparent 50%),
    radial-gradient(ellipse at 100% 100%,rgba(200,228,208,.35) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 10%,rgba(252,232,240,.40) 0%,transparent 40%);
}

/* ── NAV ── */
.nav{
  position:sticky;top:0;z-index:100;
  height:var(--nav-h);
  background:rgba(250,248,244,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--cream-3);
  display:flex;align-items:center;padding:0 28px;gap:0;
}
.nav-brand{
  font-family:'Cormorant Garamond',serif;
  font-size:1.25rem;font-weight:600;
  color:var(--lav-4);letter-spacing:.04em;
  margin-right:auto;text-decoration:none;
}
.nav-links{display:flex;gap:3px;}
.nav-link{
  display:flex;align-items:center;gap:6px;
  padding:7px 16px;border-radius:50px;
  border:1px solid transparent;background:transparent;
  font-family:'Nunito',sans-serif;font-size:.83rem;font-weight:500;
  color:var(--text-2);cursor:pointer;transition:all .2s;
  text-decoration:none;
}
.nav-link:hover{background:var(--cream-2);color:var(--lav-4);}
.nav-link.active{background:var(--lav-1);border-color:var(--lav-2);color:var(--lav-4);font-weight:600;}
.nav-user{
  display:flex;align-items:center;gap:7px;
  margin-left:12px;padding:4px 12px 4px 4px;
  background:var(--pink-1);border:1px solid var(--pink-2);
  border-radius:50px;cursor:pointer;transition:all .18s;
}
.nav-user:hover{background:var(--pink-2);}
.nav-avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink-3),var(--lav-3));
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;font-weight:700;color:white;flex-shrink:0;
}
.nav-user-name{font-size:.78rem;color:var(--pink-4);font-weight:500;}
.nav-signout{font-size:.68rem;color:var(--text-3);background:none;border:none;cursor:pointer;transition:color .15s;}
.nav-signout:hover{color:var(--pink-4);}

/* ── AUTH ── */
.auth-overlay{
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(145deg,rgba(240,236,252,.95),rgba(252,232,240,.95));
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
}
.auth-overlay.hidden{display:none;}
.auth-card{
  background:var(--white);border-radius:var(--radius-lg);
  padding:44px 40px 36px;max-width:380px;width:90%;
  box-shadow:var(--shadow-lg);border:1px solid var(--lav-2);
  animation:authPop .4s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes authPop{from{opacity:0;transform:scale(.88) translateY(16px);}to{opacity:1;transform:scale(1) translateY(0);}}
.auth-card h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:var(--lav-4);text-align:center;margin-bottom:6px;}
.auth-card>p{font-size:.82rem;color:var(--text-3);text-align:center;line-height:1.6;margin-bottom:28px;}
.auth-form{display:flex;flex-direction:column;gap:10px;}
.auth-input{
  width:100%;padding:11px 15px;border-radius:var(--radius-sm);
  border:1.5px solid var(--cream-3);background:var(--cream);
  font-family:'Nunito',sans-serif;font-size:.88rem;color:var(--text-1);
  outline:none;transition:border .18s;
}
.auth-input:focus{border-color:var(--lav-3);background:var(--white);}
.auth-input::placeholder{color:var(--text-4);}
.auth-submit-btn{
  width:100%;padding:12px;border-radius:var(--radius-sm);border:none;
  background:linear-gradient(135deg,var(--lav-4),var(--pink-3));
  color:white;font-family:'Nunito',sans-serif;
  font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;
  box-shadow:0 4px 14px rgba(128,104,208,.30);letter-spacing:.02em;margin-top:4px;
}
.auth-submit-btn:hover{transform:translateY(-2px);box-shadow:0 7px 20px rgba(128,104,208,.38);}
.auth-submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.auth-toggle{
  font-size:.78rem;color:var(--text-3);text-align:center;
  background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif;
  transition:color .15s;margin-top:4px;
}
.auth-toggle span{color:var(--lav-4);font-weight:600;}
.auth-error{
  font-size:.76rem;color:var(--pink-4);
  background:var(--pink-1);border:1px solid var(--pink-2);
  border-radius:var(--radius-sm);padding:8px 12px;
  display:none;line-height:1.45;
}
.auth-error.show{display:block;}

/* ── LOADING ── */
.loading-overlay{
  position:fixed;inset:0;z-index:998;
  background:rgba(250,248,244,.85);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.loading-overlay.hidden{display:none;}
.loading-ring{
  width:40px;height:40px;border-radius:50%;
  border:2.5px solid var(--lav-2);border-top-color:var(--lav-4);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── MODAL ── */
.modal-backdrop{
  position:fixed;inset:0;z-index:500;
  background:rgba(42,34,48,.35);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;
}
.modal-backdrop.hidden{display:none;}
.modal{
  background:var(--white);border-radius:var(--radius);
  padding:28px 28px 22px;max-width:340px;width:90%;
  box-shadow:var(--shadow-lg);animation:authPop .3s cubic-bezier(.34,1.56,.64,1) both;
}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--text-1);margin-bottom:12px;}
.modal-input{
  width:100%;padding:10px 14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--cream-3);background:var(--cream);
  font-family:'Nunito',sans-serif;font-size:.88rem;color:var(--text-1);
  outline:none;margin-bottom:14px;transition:border .18s;
}
.modal-input:focus{border-color:var(--lav-3);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.modal-confirm{
  padding:9px 20px;border-radius:var(--radius-sm);border:none;
  background:linear-gradient(135deg,var(--lav-4),var(--pink-3));
  color:white;font-family:'Nunito',sans-serif;font-size:.83rem;font-weight:600;cursor:pointer;
}
.modal-cancel{
  padding:9px 16px;border-radius:var(--radius-sm);
  border:1.5px solid var(--cream-3);background:var(--white);
  color:var(--text-3);font-family:'Nunito',sans-serif;font-size:.83rem;cursor:pointer;
}

/* ── PAGE HEADER ── */
.page-header{text-align:center;padding:28px 20px 10px;}
.page-header h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.6rem,3.5vw,2.4rem);color:var(--text-1);
  letter-spacing:.06em;text-transform:uppercase;
}
.page-header p{color:var(--text-3);font-size:.8rem;margin-top:5px;letter-spacing:.04em;text-transform:uppercase;}

/* ── WRAP ── */
.dash-wrap{max-width:1340px;margin:0 auto;padding:0 22px 70px;}

/* ── SECTION LABEL ── */
.section-label{
  display:flex;align-items:center;gap:10px;
  margin:24px 0 12px;
}
.section-label h2{
  font-family:'Cormorant Garamond',serif;
  font-size:1.15rem;font-weight:600;color:var(--text-1);
  letter-spacing:.04em;text-transform:uppercase;
  white-space:nowrap;
}
.section-label::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--cream-3),transparent);
}

/* ── CARD ── */
.card{
  background:var(--white);border-radius:var(--radius);
  border:1px solid var(--cream-3);box-shadow:var(--shadow-sm);
  padding:22px 24px;transition:box-shadow .25s;
}
.card:hover{box-shadow:var(--shadow-md);}
.card-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.05rem;font-weight:600;color:var(--text-1);
  margin-bottom:14px;display:flex;align-items:center;gap:7px;
}
.card-title a{color:inherit;text-decoration:none;}
.card-title a:hover{color:var(--lav-4);}

/* ── TODAY LAYOUT ── */
.today-row{display:grid;grid-template-columns:minmax(260px,360px) 1fr;gap:16px;}

/* ── SCHEDULE ── */
.schedule-list{display:flex;flex-direction:column;gap:7px;}
.schedule-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 12px;border-radius:var(--radius-sm);
  background:var(--cream);border-left:3px solid var(--lav-3);
  transition:background .15s;
}
.schedule-item:hover{background:var(--lav-1);}
.schedule-time{
  font-size:.72rem;font-weight:700;color:var(--lav-4);
  white-space:nowrap;min-width:48px;margin-top:1px;
}
.schedule-text{font-size:.83rem;color:var(--text-2);line-height:1.45;}
.schedule-item:nth-child(5n+1){border-color:#b8a8ec;}
.schedule-item:nth-child(5n+2){border-color:#e89abf;}
.schedule-item:nth-child(5n+3){border-color:#88c8a4;}
.schedule-item:nth-child(5n+4){border-color:#90bef0;}
.schedule-item:nth-child(5n+5){border-color:#f0a880;}
.schedule-empty{text-align:center;padding:30px 0;color:var(--text-4);font-size:.82rem;font-style:italic;}

/* ── HABIT TRACKER ── */
.habit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.habit-month-nav{display:flex;align-items:center;gap:8px;}
.month-nav-btn{
  width:28px;height:28px;border-radius:50%;
  border:1.5px solid var(--lav-2);background:var(--lav-1);
  color:var(--lav-4);font-size:.85rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.month-nav-btn:hover{background:var(--lav-2);}
.month-label{
  font-family:'Cormorant Garamond',serif;
  font-size:1rem;font-weight:600;color:var(--text-1);
  min-width:130px;text-align:center;
}
.add-habit-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:50px;
  border:1.5px solid var(--lav-2);background:var(--lav-1);
  color:var(--lav-4);font-family:'Nunito',sans-serif;
  font-size:.78rem;font-weight:600;cursor:pointer;
  transition:all .18s;
}
.add-habit-btn:hover{background:var(--lav-2);transform:translateY(-1px);}
.habit-table-outer{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--cream-3);}
.habit-table{width:100%;border-collapse:collapse;min-width:600px;}
.habit-table th{
  background:linear-gradient(to bottom,var(--lav-1),var(--cream));
  color:var(--text-3);font-size:.66rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  padding:8px 6px;border-bottom:2px solid var(--lav-2);
  position:sticky;top:0;white-space:nowrap;text-align:center;
}
.habit-table th.col-no{width:42px;text-align:center;}
.habit-table th.col-name{text-align:left;padding-left:14px;min-width:130px;position:sticky;left:0;z-index:2;background:linear-gradient(to bottom,var(--lav-1),var(--cream));}
.habit-table td{border-bottom:1px solid var(--cream-3);padding:0;vertical-align:middle;text-align:center;}
.habit-table td.td-no{font-size:.72rem;color:var(--text-4);font-weight:600;padding:0 6px;}
.habit-table td.td-name{
  text-align:left;padding:8px 10px 8px 14px;
  font-size:.82rem;color:var(--text-1);font-weight:600;
  background:var(--cream);position:sticky;left:0;z-index:1;min-width:130px;
}
.habit-table tr:hover td.td-name{background:var(--lav-1);}
.habit-table tr:last-child td{border-bottom:none;}
.day-cell{width:26px;min-width:26px;height:36px;cursor:pointer;position:relative;}
.day-dot{
  width:18px;height:18px;border-radius:5px;
  border:1.5px solid var(--cream-3);background:var(--cream);
  margin:auto;transition:all .15s;
}
.day-cell:hover .day-dot{border-color:var(--lav-3);background:var(--lav-1);}
.day-cell.checked .day-dot{
  background:linear-gradient(135deg,var(--lav-3),var(--pink-3));
  border-color:transparent;
}
.day-cell.checked .day-dot::after{
  content:'✓';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:.6rem;color:white;font-weight:800;pointer-events:none;
}
.day-cell.today-col .day-dot{border-color:var(--lav-4);border-width:2px;}
.day-cell.future-col{opacity:.4;pointer-events:none;}
.th-today{color:var(--lav-4)!important;font-weight:800!important;}
.habit-delete{
  width:20px;height:20px;border-radius:50%;border:none;background:none;cursor:pointer;
  color:var(--pink-3);font-size:.75rem;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.habit-delete:hover{color:var(--pink-4);background:var(--pink-1);}
.td-del{width:30px;padding-right:8px;}
.td-name-inner{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.empty-habits{text-align:center;padding:30px;color:var(--text-4);font-size:.84rem;font-style:italic;}

@media(max-width:820px){
  .today-row{grid-template-columns:1fr;}
  .nav{padding:0 14px;}
  .nav-link{padding:6px 10px;font-size:.75rem;}
  .dash-wrap{padding:0 14px 50px;}
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-ring"></div>
</div>

<!-- AUTH -->
<div class="auth-overlay hidden" id="auth-overlay">
  <div class="auth-card">
    <h2 id="auth-title">Welcome Back ♡</h2>
    <p id="auth-subtitle">Sign in to sync your planner across all devices.</p>
    <div class="auth-form">
      <div class="auth-error" id="auth-error"></div>
      <input class="auth-input" type="email" id="auth-email" placeholder="Email address" autocomplete="email">
      <input class="auth-input" type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
      <input class="auth-input" type="password" id="auth-confirm" placeholder="Confirm password" style="display:none" autocomplete="new-password">
      <button class="auth-submit-btn" id="auth-submit-btn" onclick="handleAuthSubmit()">Sign In</button>
      <button class="auth-toggle" id="auth-toggle-btn" onclick="toggleAuthMode()">
        Don't have an account? <span>Create one</span>
      </button>
    </div>
  </div>
</div>

<!-- ADD HABIT MODAL -->
<div class="modal-backdrop hidden" id="habit-modal">
  <div class="modal">
    <h3>✿ Add New Habit</h3>
    <input class="modal-input" type="text" id="new-habit-input" placeholder="e.g. Drink 8 glasses of water" maxlength="60">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeHabitModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmAddHabit()">Add Habit</button>
    </div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <a href="special.html" class="nav-brand">✿ My Planner</a>
  <div class="nav-links">
    <a href="index.html"   class="nav-link active">Dashboard</a>
    <a href="todo.html"    class="nav-link">To-Do</a>
    <a href="goal.html"    class="nav-link">Goals</a>
    <a href="finance.html" class="nav-link">Finance</a>
    <a href="planner.html" class="nav-link">Planner</a>
  </div>
  <div class="nav-user" id="nav-user" style="display:none">
    <div class="nav-avatar" id="nav-avatar">?</div>
    <span class="nav-user-name" id="nav-name"></span>
    <button class="nav-signout" onclick="signOut()" title="Sign out">✕</button>
  </div>
</nav>

<!-- MAIN -->
<main>
  <div class="page-header">
    <h1>✿ Dashboard ✿</h1>
    <p id="today-date-header">loading…</p>
  </div>

  <div class="dash-wrap">

    <!-- TODAY'S SCHEDULE + HABIT SIDE BY SIDE -->
    <div class="section-label"><h2>✦ Today's overview</h2></div>
    <div class="today-row">

      <!-- Today's Schedule -->
      <div class="card">
        <div class="card-title" style="justify-content:space-between;">
        <span>🗓 <a href="planner.html">Today's Schedule</a></span>
        <a href="planner.html?view=week" title="Open this week's planner"
          style="width:28px;height:28px;border-radius:50%;background:var(--lav-1);border:1.5px solid var(--lav-2);color:var(--lav-4);display:flex;align-items:center;justify-content:center;font-size:.75rem;text-decoration:none;flex-shrink:0;transition:all .18s;"
          onmouseover="this.style.background='var(--lav-2)'"
          onmouseout="this.style.background='var(--lav-1)'">↗</a>
      </div>
        </div>
        <div class="schedule-list" id="schedule-list">
          <div class="schedule-empty">No events scheduled for today ♡</div>
        </div>
      </div>

      <!-- Habit Tracker (inline, same row) -->
      <div class="card" style="padding:20px 20px 16px;">
        <div class="habit-header">
          <div class="card-title" style="margin-bottom:0;">🌱 Habit Tracker</div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="habit-month-nav">
              <button class="month-nav-btn" onclick="changeHabitMonth(-1)">‹</button>
              <span class="month-label" id="habit-month-label"></span>
              <button class="month-nav-btn" onclick="changeHabitMonth(1)">›</button>
            </div>
            <button class="add-habit-btn" onclick="openHabitModal()">+ Add Habit</button>
          </div>
        </div>
        <div style="margin-top:14px;">
          <div class="habit-table-outer">
            <table class="habit-table" id="habit-table">
              <thead id="habit-thead"></thead>
              <tbody id="habit-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div><!-- /today-row -->
  </div><!-- /dash-wrap -->
</main>

<!-- Firebase loaded AFTER page paint -->
<script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* ── UTILS ── */
function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(date){
  const d=new Date(date);
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getWeekStart(date){
  const d=new Date(date),day=d.getDay();
  return new Date(d.setDate(d.getDate()-day));
}
function formatHour(hour){
  const h=Math.floor(hour),m=Math.round((hour-h)*60);
  const ampm=h>=12?'pm':'am',hr=h%12||12;
  return`${hr}:${String(m).padStart(2,'0')}${ampm}`;
}

/* ── STATE ── */
const today=new Date();
let currentUser=null,authMode='signin';
let plannerData={},habitData={habits:[],completions:{}};
let habitViewDate=new Date(today.getFullYear(),today.getMonth(),1);

/* ── DATE HEADER ── */
document.getElementById('today-date-header').textContent=
  today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}).toLowerCase();

/* ── INIT RENDER (immediate, no Firebase needed) ── */
renderHabits();

/* ── FIREBASE INIT (waits for defer) ── */
window.addEventListener('load',()=>{
  const firebaseConfig={
    apiKey:"AIzaSyDhNIhPG5yOWkk40VMsEGe6WhI_HjjDXxs",
    authDomain:"imthebestdotplannner.firebaseapp.com",
    projectId:"imthebestdotplannner",
    storageBucket:"imthebestdotplannner.firebasestorage.app",
    messagingSenderId:"600432148406",
    appId:"1:600432148406:web:080690db2504b94f918b17"
  };
  firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth();
  const db=firebase.firestore();

  /* ── AUTH FUNCTIONS ── */
  window.signOut=()=>{ if(confirm('Sign out? ♡')) auth.signOut(); };
  window.toggleAuthMode=()=>{
    authMode=authMode==='signin'?'signup':'signin';
    const s=authMode==='signup';
    document.getElementById('auth-title').textContent=s?'Create Account ♡':'Welcome Back ♡';
    document.getElementById('auth-subtitle').textContent=s?'Create an account to sync your planner.':'Sign in to sync your planner.';
    document.getElementById('auth-submit-btn').textContent=s?'Create Account':'Sign In';
    document.getElementById('auth-confirm').style.display=s?'':'none';
    document.getElementById('auth-toggle-btn').innerHTML=s?'Already have an account? <span>Sign in</span>':"Don't have an account? <span>Create one</span>";
    document.getElementById('auth-error').classList.remove('show');
  };
  window.handleAuthSubmit=async()=>{
    const email=document.getElementById('auth-email').value.trim();
    const pw=document.getElementById('auth-password').value;
    const conf=document.getElementById('auth-confirm').value;
    document.getElementById('auth-error').classList.remove('show');
    if(!email||!pw){showAuthError('Please enter your email and password.');return;}
    if(authMode==='signup'&&pw!==conf){showAuthError("Passwords don't match.");return;}
    if(pw.length<6){showAuthError('Password must be at least 6 characters.');return;}
    const btn=document.getElementById('auth-submit-btn');
    btn.disabled=true;btn.textContent=authMode==='signup'?'Creating…':'Signing in…';
    try{
      if(authMode==='signup') await auth.createUserWithEmailAndPassword(email,pw);
      else await auth.signInWithEmailAndPassword(email,pw);
    }catch(err){
      btn.disabled=false;btn.textContent=authMode==='signup'?'Create Account':'Sign In';
      const msgs={'auth/user-not-found':'No account found.','auth/wrong-password':'Incorrect password.',
        'auth/email-already-in-use':'Account already exists.','auth/invalid-email':'Invalid email.',
        'auth/weak-password':'Password too weak.','auth/too-many-requests':'Too many attempts.',
        'auth/invalid-credential':'Incorrect email or password.'};
      showAuthError(msgs[err.code]||err.message);
    }
  };

  auth.onAuthStateChanged(user=>{
    currentUser=user;
    document.getElementById('loading-overlay').classList.add('hidden');
    if(user){
      document.getElementById('auth-overlay').classList.add('hidden');
      document.getElementById('nav-user').style.display='flex';
      document.getElementById('nav-avatar').textContent=(user.email||'?')[0].toUpperCase();
      document.getElementById('nav-name').textContent=user.email?.split('@')[0]||'';
      setupListeners(user.uid,db);
    }else{
      document.getElementById('auth-overlay').classList.remove('hidden');
      document.getElementById('nav-user').style.display='none';
      plannerData={};habitData={habits:[],completions:{}};
      renderSchedule();renderHabits();
    }
  });

  function setupListeners(uid,db){
    const ref=db.collection('users').doc(uid).collection('planner');
    // Only listen to what we need: planner + habits
    ref.doc('main').onSnapshot(snap=>{
      plannerData=snap.exists?snap.data():{};
      renderSchedule();
    });
    ref.doc('habits').onSnapshot(snap=>{
      if(snap.exists){
        const d=snap.data();
        habitData={habits:d.habits||[],completions:d.completions||{}};
      }else{
        habitData={habits:[],completions:{}};
      }
      renderHabits();
    });
  }

  window._db=db; // expose for saves
});

/* ── SCHEDULE ── */
function renderSchedule(){
  const el=document.getElementById('schedule-list');
  const yr=today.getFullYear(),mo=today.getMonth();
  const weekKey=fmtDate(getWeekStart(today));
  const dateStr=fmtDate(today);
  let slots=[];
  if(plannerData[yr]?.[mo]?.weeks?.[weekKey]?.[dateStr]){
    slots=plannerData[yr][mo].weeks[weekKey][dateStr];
  }
  if(!slots.length){
    el.innerHTML='<div class="schedule-empty">No events scheduled for today ♡</div>';
    return;
  }
  slots=[...slots].sort((a,b)=>(a.hour??9999)-(b.hour??9999));
  el.innerHTML=slots.map(s=>`
    <div class="schedule-item">
      <span class="schedule-time">${s.hour!==undefined?formatHour(s.hour):''}</span>
      <span class="schedule-text">${escHtml(s.text||'Unnamed event')}</span>
    </div>`).join('');
}

/* ── HABITS ── */
function getHabitMonthKey(d){
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function changeHabitMonth(dir){
  habitViewDate=new Date(habitViewDate.getFullYear(),habitViewDate.getMonth()+dir,1);
  renderHabits();
}

function renderHabits(){
  const yr=habitViewDate.getFullYear(),mo=habitViewDate.getMonth();
  const mKey=getHabitMonthKey(habitViewDate);
  const days=new Date(yr,mo+1,0).getDate();
  const todayDay=(today.getFullYear()===yr&&today.getMonth()===mo)?today.getDate():null;
  const isFutureMonth=yr>today.getFullYear()||(yr===today.getFullYear()&&mo>today.getMonth());
  const isPastMonth=yr<today.getFullYear()||(yr===today.getFullYear()&&mo<today.getMonth());

  document.getElementById('habit-month-label').textContent=
    new Date(yr,mo,1).toLocaleString('default',{month:'long',year:'numeric'});

  // Header
  let hCols=`<th class="col-no">#</th><th class="col-name">Habit</th>`;
  for(let d=1;d<=days;d++){
    hCols+=`<th class="${d===todayDay?'th-today':''}">${d}</th>`;
  }
  hCols+=`<th></th>`;
  document.getElementById('habit-thead').innerHTML=`<tr>${hCols}</tr>`;

  // Body
  const habits=habitData.habits||[];
  const completions=(habitData.completions||{})[mKey]||{};

  if(!habits.length){
    document.getElementById('habit-tbody').innerHTML=
      `<tr><td colspan="${days+3}" class="empty-habits">No habits yet — add one above ♡</td></tr>`;
    return;
  }

  document.getElementById('habit-tbody').innerHTML=habits.map((h,idx)=>{
    const checked=completions[h.id]||[];
    let cells='';
    for(let d=1;d<=days;d++){
      const isDone=checked.includes(d);
      const isTod=d===todayDay;
      let cls='day-cell';
      if(isDone) cls+=' checked';
      if(isTod)  cls+=' today-col';
      if(!isPastMonth&&!isDone&&todayDay&&d>todayDay) cls+=' future-col';
      if(isFutureMonth) cls+=' future-col';
      cells+=`<td class="${cls}" onclick="toggleHabit('${h.id}',${d},'${mKey}')"><div class="day-dot"></div></td>`;
    }
    return`<tr>
      <td class="td-no">${idx+1}</td>
      <td class="td-name"><div class="td-name-inner"><span>${escHtml(h.name)}</span>
        <button class="habit-delete" onclick="deleteHabit('${h.id}')" title="Remove habit">✕</button>
      </div></td>
      ${cells}
      <td class="td-del"></td>
    </tr>`;
  }).join('');
}

function toggleHabit(habitId,day,mKey){
  if(!currentUser) return;
  const comps=JSON.parse(JSON.stringify(habitData.completions||{}));
  if(!comps[mKey]) comps[mKey]={};
  if(!comps[mKey][habitId]) comps[mKey][habitId]=[];
  const idx=comps[mKey][habitId].indexOf(day);
  if(idx===-1) comps[mKey][habitId].push(day);
  else comps[mKey][habitId].splice(idx,1);
  saveHabits({...habitData,completions:comps});
}

function openHabitModal(){
  document.getElementById('new-habit-input').value='';
  document.getElementById('habit-modal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('new-habit-input').focus(),50);
}
function closeHabitModal(){
  document.getElementById('habit-modal').classList.add('hidden');
}
function confirmAddHabit(){
  const name=document.getElementById('new-habit-input').value.trim();
  if(!name||!currentUser){closeHabitModal();return;}
  const id='h_'+Date.now();
  saveHabits({...habitData,habits:[...(habitData.habits||[]),{id,name}]});
  closeHabitModal();
}
function deleteHabit(habitId){
  if(!currentUser) return;
  if(!confirm('Remove this habit? ♡')) return;
  saveHabits({...habitData,habits:(habitData.habits||[]).filter(h=>h.id!==habitId)});
}
function saveHabits(data){
  if(!currentUser||!window._db) return;
  window._db.collection('users').doc(currentUser.uid).collection('planner').doc('habits')
    .set(data).catch(console.error);
}

/* ── MODAL EVENTS ── */
document.getElementById('new-habit-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') confirmAddHabit();
  if(e.key==='Escape') closeHabitModal();
});
document.getElementById('habit-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('habit-modal')) closeHabitModal();
});

/* ── AUTH ERROR ── */
function showAuthError(msg){
  const el=document.getElementById('auth-error');
  el.textContent=msg;el.classList.add('show');
}
</script>
