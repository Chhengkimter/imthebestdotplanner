<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✿ My Goals ✿</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  /* ── CSS Variables ── */
  :root {
    --cream:       #faf8f5;
    --cream-dark:  #f3efe9;
    --parchment:   #ede8df;
    --ink:         #2c2825;
    --ink-light:   #6b6460;
    --ink-muted:   #9c9490;

    --cat-personal: #f472b6;
    --cat-work:     #a855f7;
    --cat-school:   #22c55e;

    --status-none:  #f3f4f6;
    --status-prog:  #dbeafe;
    --status-done:  #d1fae5;

    --status-none-text:  #6b7280;
    --status-prog-text:  #1d4ed8;
    --status-done-text:  #065f46;

    --shadow-sm: 0 1px 4px rgba(44,40,37,.06);
    --shadow-md: 0 4px 20px rgba(44,40,37,.10);
    --shadow-lg: 0 8px 40px rgba(44,40,37,.14);

    --radius: 18px;
    --card-width: 360px;
  }

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(244,114,182,.07) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(168,85,247,.06) 0%, transparent 50%),
      radial-gradient(circle at 60% 30%, rgba(34,197,94,.04) 0%, transparent 40%);
    pointer-events: none; z-index: 0;
  }

  /* ── Page layout ── */
  .page { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 48px 24px 80px; }

  /* ── Header ── */
  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 40px; flex-wrap: wrap; gap: 16px;
  }
  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .page-title span { color: var(--cat-personal); }
  .page-subtitle {
    font-size: 13px; color: var(--ink-muted);
    font-weight: 400; margin-top: 4px;
    letter-spacing: .02em;
  }
  .btn-add-goal {
    display: flex; align-items: center; gap: 8px;
    background: var(--ink); color: #fff;
    border: none; border-radius: 50px;
    padding: 12px 22px; font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer;
    letter-spacing: .03em;
    box-shadow: 0 4px 14px rgba(44,40,37,.25);
    transition: transform .2s, box-shadow .2s;
  }
  .btn-add-goal:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(44,40,37,.3); }
  .btn-add-goal svg { width: 16px; height: 16px; }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 32px;
    flex-wrap: wrap; align-items: center;
  }
  .filter-pill {
    padding: 6px 16px; border-radius: 50px;
    border: 1.5px solid var(--parchment);
    background: transparent; font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer;
    color: var(--ink-light); letter-spacing: .04em;
    transition: all .18s;
  }
  .filter-pill:hover { border-color: var(--ink-muted); color: var(--ink); }
  .filter-pill.active {
    background: var(--ink); color: #fff; border-color: var(--ink);
  }
  .filter-pill.cat-personal.active { background: var(--cat-personal); border-color: var(--cat-personal); }
  .filter-pill.cat-work.active    { background: var(--cat-work);     border-color: var(--cat-work); }
  .filter-pill.cat-school.active  { background: var(--cat-school);   border-color: var(--cat-school); }

  /* ── Cards grid ── */
  .goals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--card-width), 1fr));
    gap: 24px;
    align-items: start;
  }
  .empty-state {
    grid-column: 1 / -1;
    text-align: center; padding: 80px 24px;
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { color: var(--ink-muted); font-size: 15px; }

  /* ══ GOAL CARD ══ */
  .goal-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    overflow: hidden;
    transition: box-shadow .25s, transform .25s;
    animation: cardIn .4s ease both;
  }
  .goal-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Tier 1 – Header */
  .card-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 12px;
    padding: 20px 20px 14px;
  }
  .card-title-block { flex: 1; min-width: 0; }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem; font-weight: 600;
    line-height: 1.25; letter-spacing: -0.01em;
    color: var(--ink);
  }
  .card-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }

  /* Category dot */
  .cat-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .cat-dot.personal { background: var(--cat-personal); }
  .cat-dot.work     { background: var(--cat-work); }
  .cat-dot.school   { background: var(--cat-school); }

  /* Status badge */
  .status-badge {
    font-size: 10px; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; padding: 3px 9px; border-radius: 50px;
    flex-shrink: 0;
  }
  .status-badge.not-started { background: var(--status-none); color: var(--status-none-text); }
  .status-badge.in-progress  { background: var(--status-prog); color: var(--status-prog-text); }
  .status-badge.completed    { background: var(--status-done); color: var(--status-done-text); }

  /* Card actions (notes + delete) */
  .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .card-icon-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: none; background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-muted); transition: background .18s, color .18s;
  }
  .card-icon-btn:hover { background: var(--cream-dark); color: var(--ink); }
  .card-icon-btn svg { width: 15px; height: 15px; }

  /* Tier 2 – Motivation */
  .card-why {
    background: #f9f5ff;
    border-left: 3px solid #d8b4fe;
    margin: 0 16px 14px;
    border-radius: 8px;
    padding: 10px 14px;
  }
  .card-why-label {
    font-size: 9px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: #9333ea; margin-bottom: 3px;
  }
  .card-why-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 14px; color: #6b21a8;
    line-height: 1.45;
  }

  /* Tier 3 – Progress bar */
  .card-progress { padding: 0 16px 14px; }
  .progress-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .progress-label { font-size: 11px; font-weight: 600; color: var(--ink-light); letter-spacing: .04em; }
  .progress-pct   { font-size: 12px; font-weight: 700; color: var(--ink); }
  .progress-track {
    height: 6px; background: var(--cream-dark); border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, #a855f7, #ec4899);
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }

  /* Deadline pill */
  .deadline-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600; letter-spacing: .03em;
    padding: 3px 9px; border-radius: 50px;
    background: var(--cream-dark); color: var(--ink-light);
    margin: 0 16px 14px; border: 1px solid var(--parchment);
  }
  .deadline-pill svg { width: 11px; height: 11px; }
  .deadline-pill.urgent { background: #fff1f2; color: #be123c; border-color: #fecdd3; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .65; }
  }

  /* Tier 4 – Tasks */
  .card-tasks { padding: 0 16px 16px; }
  .tasks-header {
    font-size: 10px; font-weight: 700; color: var(--ink-muted);
    letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px;
  }
  .tasks-scroll {
    max-height: 200px; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: var(--parchment) transparent;
  }
  .task-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 7px 0; border-bottom: 1px solid var(--cream-dark);
    transition: opacity .2s;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item.done { opacity: .5; }
  .task-item.done .task-label { text-decoration: line-through; color: var(--ink-muted); }

  /* Custom checkbox */
  .task-check {
    width: 17px; height: 17px; flex-shrink: 0;
    border: 2px solid var(--parchment); border-radius: 5px;
    cursor: pointer; appearance: none; -webkit-appearance: none;
    background: #fff; margin-top: 1px;
    transition: background .18s, border-color .18s;
    position: relative;
  }
  .task-check:checked {
    background: linear-gradient(135deg, #a855f7, #ec4899);
    border-color: transparent;
  }
  .task-check:checked::after {
    content: '';
    position: absolute; top: 2px; left: 5px;
    width: 5px; height: 9px;
    border: 2px solid #fff; border-top: none; border-left: none;
    transform: rotate(45deg);
  }
  .task-label {
    font-size: 13px; font-weight: 400; color: var(--ink);
    line-height: 1.4; flex: 1;
  }
  .task-delete-btn {
    opacity: 0; background: none; border: none; cursor: pointer;
    color: var(--ink-muted); padding: 2px; border-radius: 4px;
    transition: opacity .18s, color .18s;
  }
  .task-item:hover .task-delete-btn { opacity: 1; }
  .task-delete-btn:hover { color: #e11d48; }
  .task-delete-btn svg { width: 12px; height: 12px; display: block; }

  /* Add task */
  .add-task-row { margin-top: 10px; }
  .btn-add-task {
    display: flex; align-items: center; gap: 6px;
    background: none; border: 1.5px dashed var(--parchment); border-radius: 8px;
    width: 100%; padding: 8px 12px; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 600;
    color: var(--ink-muted); letter-spacing: .03em;
    transition: border-color .18s, color .18s, background .18s;
  }
  .btn-add-task:hover { border-color: var(--ink-muted); color: var(--ink); background: var(--cream-dark); }
  .btn-add-task svg { width: 14px; height: 14px; }
  .add-task-input-row {
    display: none; align-items: center; gap: 8px; margin-top: 8px;
  }
  .add-task-input-row.open { display: flex; }
  .add-task-input {
    flex: 1; border: 1.5px solid var(--parchment); border-radius: 8px;
    padding: 7px 12px; font-family: 'Nunito', sans-serif; font-size: 13px;
    background: var(--cream-dark); color: var(--ink); outline: none;
    transition: border-color .18s;
  }
  .add-task-input:focus { border-color: #a855f7; }
  .btn-confirm-task {
    background: var(--ink); color: #fff; border: none; border-radius: 8px;
    padding: 7px 14px; font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    transition: opacity .18s;
  }
  .btn-confirm-task:hover { opacity: .85; }

  /* ══ MODALS ══ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(44,40,37,.45);
    backdrop-filter: blur(4px);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    padding: 24px; opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: #fff; border-radius: 20px;
    box-shadow: var(--shadow-lg);
    width: 100%; max-width: 520px;
    padding: 32px; position: relative;
    transform: translateY(20px) scale(.97);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem; font-weight: 600; margin-bottom: 20px;
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--cream-dark); border: none; border-radius: 50%;
    width: 32px; height: 32px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-muted); transition: background .18s;
  }
  .modal-close:hover { background: var(--parchment); }
  .modal-close svg { width: 14px; height: 14px; }

  /* Form fields */
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 11px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    color: var(--ink-light); margin-bottom: 6px;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%; border: 1.5px solid var(--parchment); border-radius: 10px;
    padding: 10px 14px; font-family: 'Nunito', sans-serif; font-size: 14px;
    background: var(--cream-dark); color: var(--ink); outline: none;
    transition: border-color .18s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: #a855f7; }
  .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cat-selector { display: flex; gap: 10px; }
  .cat-option { display: none; }
  .cat-option + label {
    padding: 7px 16px; border-radius: 50px; font-size: 12px;
    font-weight: 700; cursor: pointer; border: 2px solid var(--parchment);
    color: var(--ink-light); transition: all .18s;
  }
  .cat-option:checked + label { color: #fff; border-color: transparent; }
  #cat-personal:checked + label { background: var(--cat-personal); }
  #cat-work:checked + label    { background: var(--cat-work); }
  #cat-school:checked + label  { background: var(--cat-school); }

  .btn-primary {
    background: var(--ink); color: #fff; border: none; border-radius: 50px;
    padding: 12px 28px; font-family: 'Nunito', sans-serif; font-size: 14px;
    font-weight: 700; cursor: pointer; width: 100%; margin-top: 4px;
    transition: opacity .2s, transform .2s;
  }
  .btn-primary:hover { opacity: .88; transform: translateY(-1px); }

  /* ── Reflection modal ── */
  .reflection-entries { max-height: 200px; overflow-y: auto; margin-bottom: 16px; }
  .reflection-entry {
    border-left: 3px solid var(--parchment); padding: 10px 14px;
    margin-bottom: 10px; border-radius: 0 8px 8px 0;
    background: var(--cream-dark);
  }
  .reflection-entry-date { font-size: 10px; color: var(--ink-muted); margin-bottom: 3px; }
  .reflection-entry-type {
    display: inline-block; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em;
    padding: 2px 7px; border-radius: 50px; margin-bottom: 4px;
  }
  .reflection-entry-type.update { background: #dbeafe; color: #1d4ed8; }
  .reflection-entry-type.obstacle { background: #fee2e2; color: #b91c1c; }
  .reflection-entry-type.win     { background: #d1fae5; color: #065f46; }
  .reflection-entry-text { font-size: 13px; color: var(--ink); line-height: 1.45; }

  .reflection-type-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .rtype-btn {
    flex: 1; padding: 7px; border-radius: 8px; border: 1.5px solid var(--parchment);
    font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700;
    cursor: pointer; background: none; color: var(--ink-light); transition: all .18s;
  }
  .rtype-btn.active { border-color: transparent; color: #fff; }
  .rtype-btn.update.active   { background: #3b82f6; }
  .rtype-btn.obstacle.active { background: #ef4444; }
  .rtype-btn.win.active      { background: #22c55e; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--parchment); border-radius: 99px; }
</style>
</head>
<body>

<div class="page">
<nav class="nav">
  <a href="special.html" class="nav-brand">
    <div class="nav-brand-dot"></div>
    My Planner
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="todo.html"      class="nav-link">To-Do</a>
    <a href="goal.html"      class="nav-link">Goals</a>
    <a href="finance.html"   class="nav-link active">Finance</a>
    <a href="planner.html"   class="nav-link">Planner</a>
  </div>
  <div class="nav-user" id="nav-user" style="display:none">
    <div class="nav-avatar" id="nav-avatar">?</div>
    <span class="nav-user-name" id="nav-name"></span>
    <button class="nav-signout" onclick="signOut()" title="Sign out">✕</button>
  </div>
</nav>
  <!-- Page Header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">My Goals <span>✿</span></h1>
      <p class="page-subtitle">Track what matters. Remember why it matters.</p>
    </div>
    <button class="btn-add-goal" onclick="openGoalModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Goal
    </button>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <button class="filter-pill active" data-filter="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-pill" data-filter="not-started" onclick="setFilter('not-started', this)">Not Started</button>
    <button class="filter-pill" data-filter="in-progress" onclick="setFilter('in-progress', this)">In Progress</button>
    <button class="filter-pill" data-filter="completed" onclick="setFilter('completed', this)">Completed</button>
    <button class="filter-pill cat-personal" data-filter="personal" onclick="setFilter('personal', this)">💗 Personal</button>
    <button class="filter-pill cat-work" data-filter="work" onclick="setFilter('work', this)">💜 Work</button>
    <button class="filter-pill cat-school" data-filter="school" onclick="setFilter('school', this)">💚 School</button>
  </div>

  <!-- Goals Grid -->
  <div class="goals-grid" id="goalsGrid">
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="emoji">🌱</div>
      <p>No goals yet — add one to get started.</p>
    </div>
  </div>
</div>

<!-- ══ Add Goal Modal ══ -->
<div class="modal-overlay" id="goalModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('goalModal')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2 class="modal-title">New Goal ✦</h2>

    <div class="form-group">
      <label class="form-label">Goal Title</label>
      <input class="form-input" id="gTitle" placeholder="e.g. Launch my SaaS MVP">
    </div>

    <div class="form-group">
      <label class="form-label">Why does this matter to you?</label>
      <textarea class="form-textarea" id="gWhy" placeholder="The reason that will keep you going at 2am..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Deadline</label>
        <input class="form-input" id="gDeadline" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="gStatus">
          <option value="not-started">Not Started</option>
          <option value="in-progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Category</label>
      <div class="cat-selector">
        <input class="cat-option" type="radio" name="gCat" id="cat-personal" value="personal" checked>
        <label for="cat-personal">Personal</label>
        <input class="cat-option" type="radio" name="gCat" id="cat-work" value="work">
        <label for="cat-work">Work</label>
        <input class="cat-option" type="radio" name="gCat" id="cat-school" value="school">
        <label for="cat-school">School</label>
      </div>
    </div>

    <button class="btn-primary" onclick="saveGoal()">Add Goal</button>
  </div>
</div>

<!-- ══ Reflection Modal ══ -->
<div class="modal-overlay" id="reflectModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('reflectModal')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2 class="modal-title" id="reflectTitle">Reflection Log</h2>

    <div class="reflection-entries" id="reflectEntries"></div>

    <div class="reflection-type-row">
      <button class="rtype-btn update active" data-type="update" onclick="setReflectType('update', this)">📝 Update</button>
      <button class="rtype-btn obstacle" data-type="obstacle" onclick="setReflectType('obstacle', this)">🚧 Obstacle</button>
      <button class="rtype-btn win" data-type="win" onclick="setReflectType('win', this)">🏆 Win</button>
    </div>

    <div class="form-group">
      <textarea class="form-textarea" id="reflectText" placeholder="What happened today with this goal?"></textarea>
    </div>
    <button class="btn-primary" onclick="saveReflection()">Save Entry</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   DATA LAYER — localStorage
   (swap db.collection() calls with
   Firestore once you add your config)
══════════════════════════════════════ */

const STORE_KEY = 'goals_v1';

function loadGoals() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}
function saveGoals(goals) {
  localStorage.setItem(STORE_KEY, JSON.stringify(goals));
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

/* ── State ── */
let goals = loadGoals();
let currentFilter = 'all';
let currentReflectGoalId = null;
let currentReflectType = 'update';

/* ═══ SEED DATA (remove after first real goal) ═══ */
if (goals.length === 0) {
  goals = [
    {
      id: genId(),
      title: 'Launch SaaS MVP',
      why: 'To prove I can ship a real product and build financial independence outside a 9–5.',
      deadline: (() => { const d = new Date(); d.setDate(d.getDate() + 2); return d.toISOString().split('T')[0]; })(),
      status: 'in-progress',
      category: 'work',
      tasks: [
        { id: genId(), text: 'Design landing page', done: true },
        { id: genId(), text: 'Build auth system', done: true },
        { id: genId(), text: 'Integrate Stripe', done: false },
        { id: genId(), text: 'Write onboarding copy', done: false },
        { id: genId(), text: 'Launch on Product Hunt', done: false },
      ],
      reflections: [{ id: genId(), type: 'win', text: 'Finished the database schema!', date: new Date().toLocaleDateString() }]
    },
    {
      id: genId(),
      title: 'Read 12 Books This Year',
      why: 'Reading is the cheapest mentorship. Each book is a year of someone\'s experience compressed.',
      deadline: '2026-12-31',
      status: 'in-progress',
      category: 'personal',
      tasks: [
        { id: genId(), text: 'The Lean Startup', done: true },
        { id: genId(), text: 'Deep Work', done: true },
        { id: genId(), text: 'Zero to One', done: false },
        { id: genId(), text: 'The Mom Test', done: false },
      ],
      reflections: []
    },
    {
      id: genId(),
      title: 'Ace Algorithm Course',
      why: 'Strong fundamentals will let me solve any problem — not just the ones I\'ve memorized.',
      deadline: '2026-06-30',
      status: 'not-started',
      category: 'school',
      tasks: [
        { id: genId(), text: 'Complete Week 1 modules', done: false },
        { id: genId(), text: 'Solve 10 LeetCode mediums', done: false },
      ],
      reflections: []
    }
  ];
  saveGoals(goals);
}

/* ═══════════════ RENDER ═══════════════ */

function getStatus(goal) {
  const total = goal.tasks.length;
  if (total === 0) return goal.status;
  const done = goal.tasks.filter(t => t.done).length;
  if (done === 0) return 'not-started';
  if (done === total) return 'completed';
  return 'in-progress';
}

function getProgress(goal) {
  if (!goal.tasks.length) return 0;
  return Math.round((goal.tasks.filter(t => t.done).length / goal.tasks.length) * 100);
}

function getDeadlineInfo(deadline) {
  if (!deadline) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const due = new Date(deadline + 'T00:00:00');
  const diff = Math.round((due - now) / 86400000);
  if (diff < 0)  return { label: `${Math.abs(diff)}d overdue`, urgent: true };
  if (diff === 0) return { label: 'Due today', urgent: true };
  if (diff <= 3)  return { label: `${diff}d left`, urgent: true };
  return { label: `${diff}d left`, urgent: false };
}

function statusLabel(s) {
  return { 'not-started': 'Not Started', 'in-progress': 'In Progress', 'completed': 'Completed' }[s] || s;
}

function renderCard(goal) {
  const status = getStatus(goal);
  const pct = getProgress(goal);
  const dlInfo = getDeadlineInfo(goal.deadline);
  const sortedTasks = [
    ...goal.tasks.filter(t => !t.done),
    ...goal.tasks.filter(t =>  t.done)
  ];

  const tasksHTML = sortedTasks.map(t => `
    <div class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
      <input type="checkbox" class="task-check" ${t.done ? 'checked' : ''}
        onchange="toggleTask('${goal.id}','${t.id}',this.checked)">
      <span class="task-label">${escHtml(t.text)}</span>
      <button class="task-delete-btn" onclick="deleteTask('${goal.id}','${t.id}')" title="Remove">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  `).join('');

  const deadlineHTML = dlInfo ? `
    <div class="deadline-pill ${dlInfo.urgent ? 'urgent' : ''}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      ${dlInfo.label}${goal.deadline ? ` · ${new Date(goal.deadline + 'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}` : ''}
    </div>` : '';

  return `
  <div class="goal-card" id="card-${goal.id}" data-category="${goal.category}" data-status="${status}">

    <!-- Tier 1: Header -->
    <div class="card-header">
      <div class="card-title-block">
        <div class="card-title">${escHtml(goal.title)}</div>
        <div class="card-meta">
          <div class="cat-dot ${goal.category}" title="${goal.category}"></div>
          <span class="status-badge ${status}">${statusLabel(status)}</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="card-icon-btn" onclick="openReflect('${goal.id}')" title="Reflection Log">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </button>
        <button class="card-icon-btn" onclick="deleteGoal('${goal.id}')" title="Delete goal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>

    <!-- Tier 2: Why -->
    ${goal.why ? `<div class="card-why">
      <div class="card-why-label">Why?</div>
      <div class="card-why-text">${escHtml(goal.why)}</div>
    </div>` : ''}

    <!-- Deadline -->
    ${deadlineHTML}

    <!-- Tier 3: Progress -->
    <div class="card-progress">
      <div class="progress-row">
        <span class="progress-label">Progress</span>
        <span class="progress-pct">${pct}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>

    <!-- Tier 4: Tasks -->
    <div class="card-tasks">
      <div class="tasks-header">Tasks (${goal.tasks.filter(t=>t.done).length}/${goal.tasks.length})</div>
      <div class="tasks-scroll" id="tasks-${goal.id}">
        ${tasksHTML || '<p style="font-size:12px;color:var(--ink-muted);padding:4px 0">No tasks yet.</p>'}
      </div>
      <div class="add-task-row">
        <button class="btn-add-task" onclick="openAddTask('${goal.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Task
        </button>
        <div class="add-task-input-row" id="addTaskRow-${goal.id}">
          <input class="add-task-input" id="addTaskInput-${goal.id}" placeholder="New task..."
            onkeydown="if(event.key==='Enter') confirmTask('${goal.id}')">
          <button class="btn-confirm-task" onclick="confirmTask('${goal.id}')">Add</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderAll() {
  const grid = document.getElementById('goalsGrid');
  const empty = document.getElementById('emptyState');
  const filtered = goals.filter(g => {
    const status = getStatus(g);
    if (currentFilter === 'all') return true;
    if (['personal','work','school'].includes(currentFilter)) return g.category === currentFilter;
    return status === currentFilter;
  });
  if (filtered.length === 0) {
    grid.innerHTML = '';
    grid.appendChild(empty);
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = filtered.map(renderCard).join('') + empty.outerHTML;
}

/* ═══════════════ ACTIONS ═══════════════ */

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function openGoalModal() {
  document.getElementById('gTitle').value = '';
  document.getElementById('gWhy').value = '';
  document.getElementById('gDeadline').value = '';
  document.getElementById('gStatus').value = 'not-started';
  document.querySelector('#cat-personal').checked = true;
  openModal('goalModal');
}

function saveGoal() {
  const title = document.getElementById('gTitle').value.trim();
  if (!title) { document.getElementById('gTitle').focus(); return; }
  const cat = document.querySelector('input[name="gCat"]:checked')?.value || 'personal';
  goals.push({
    id: genId(),
    title,
    why: document.getElementById('gWhy').value.trim(),
    deadline: document.getElementById('gDeadline').value,
    status: document.getElementById('gStatus').value,
    category: cat,
    tasks: [],
    reflections: []
  });
  saveGoals(goals);
  closeModal('goalModal');
  renderAll();
}

function deleteGoal(id) {
  if (!confirm('Delete this goal?')) return;
  goals = goals.filter(g => g.id !== id);
  saveGoals(goals);
  renderAll();
}

function toggleTask(goalId, taskId, checked) {
  const g = goals.find(g => g.id === goalId);
  if (!g) return;
  const t = g.tasks.find(t => t.id === taskId);
  if (t) t.done = checked;
  saveGoals(goals);
  // Re-render just this card
  const card = document.getElementById('card-' + goalId);
  if (card) card.outerHTML = renderCard(g);
}

function deleteTask(goalId, taskId) {
  const g = goals.find(g => g.id === goalId);
  if (!g) return;
  g.tasks = g.tasks.filter(t => t.id !== taskId);
  saveGoals(goals);
  const card = document.getElementById('card-' + goalId);
  if (card) card.outerHTML = renderCard(g);
}

function openAddTask(goalId) {
  const row = document.getElementById('addTaskRow-' + goalId);
  if (!row) return;
  row.classList.add('open');
  document.getElementById('addTaskInput-' + goalId)?.focus();
}

function confirmTask(goalId) {
  const inp = document.getElementById('addTaskInput-' + goalId);
  const text = inp?.value.trim();
  if (!text) return;
  const g = goals.find(g => g.id === goalId);
  if (!g) return;
  g.tasks.push({ id: genId(), text, done: false });
  saveGoals(goals);
  const card = document.getElementById('card-' + goalId);
  if (card) card.outerHTML = renderCard(g);
}

/* ── Reflection ── */
function openReflect(goalId) {
  currentReflectGoalId = goalId;
  currentReflectType = 'update';
  const g = goals.find(g => g.id === goalId);
  document.getElementById('reflectTitle').textContent = g.title + ' — Log';
  document.getElementById('reflectText').value = '';
  document.querySelectorAll('.rtype-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === 'update');
  });
  renderReflections(g);
  openModal('reflectModal');
}

function renderReflections(g) {
  const el = document.getElementById('reflectEntries');
  if (!g.reflections.length) { el.innerHTML = '<p style="font-size:12px;color:var(--ink-muted);margin-bottom:12px">No entries yet.</p>'; return; }
  el.innerHTML = [...g.reflections].reverse().map(r => `
    <div class="reflection-entry">
      <div class="reflection-entry-date">${r.date}</div>
      <span class="reflection-entry-type ${r.type}">${r.type}</span>
      <div class="reflection-entry-text">${escHtml(r.text)}</div>
    </div>`).join('');
}

function setReflectType(type, btn) {
  currentReflectType = type;
  document.querySelectorAll('.rtype-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function saveReflection() {
  const text = document.getElementById('reflectText').value.trim();
  if (!text || !currentReflectGoalId) return;
  const g = goals.find(g => g.id === currentReflectGoalId);
  if (!g) return;
  g.reflections.push({ id: genId(), type: currentReflectType, text, date: new Date().toLocaleDateString() });
  saveGoals(goals);
  document.getElementById('reflectText').value = '';
  renderReflections(g);
}

/* ── Modals ── */
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

/* ── Utils ── */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Init ── */
renderAll();
</script>
</body>
</html>
