<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✿ My Goals ✿</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root {
    --pink-1:#fce8f0; --pink-2:#f5c8dc; --pink-3:#e89abf; --pink-4:#c96090; --pink-5:#a03068;
    --lav-1:#f0ecfc;  --lav-2:#dcd4f8;  --lav-3:#b8a8ec;  --lav-4:#8068d0;  --lav-5:#5840a8;
    --blue-1:#e8f2fc; --blue-2:#c8dff8; --blue-3:#90bef0; --blue-4:#4890d8; --blue-5:#2068b0;
    --green-1:#e8f5ee;--green-2:#c4e4d0;--green-3:#88c8a4;--green-4:#48a872;--green-5:#2c7850;
    --peach-1:#fef0e8;--peach-2:#fad8c0;--peach-3:#f0a880;--peach-4:#d87040;
    --cream:#faf8f4;  --cream-2:#f2ede4; --cream-3:#e0d8c8; --cream-4:#c8bca8;
    --white:#ffffff;  --text-1:#2a2230;  --text-2:#5a5070;  --text-3:#9088a8; --text-4:#c0b8d0;

    --shadow-sm:0 2px 8px rgba(90,70,120,0.09);
    --shadow-md:0 4px 20px rgba(90,70,120,0.12);
    --shadow-lg:0 8px 40px rgba(90,70,120,0.14);
    --radius-sm:8px; --radius:14px; --radius-lg:22px; --nav-h:60px;

    --cat-personal:#f472b6; --cat-work:#a855f7; --cat-school:#22c55e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream); color: var(--text-1);
    min-height: 100vh; overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 0% 0%, rgba(220,212,248,0.45) 0%, transparent 50%),
      radial-gradient(ellipse at 100% 100%, rgba(200,228,208,0.35) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 10%, rgba(252,232,240,0.40) 0%, transparent 40%);
  }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--cream-3); border-radius: 99px; }

  /* ── NAV ── */
  .nav {
    position: sticky; top: 0; z-index: 100; height: var(--nav-h);
    background: rgba(250,248,244,0.92); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--cream-3);
    display: flex; align-items: center; padding: 0 28px; gap: 0;
  }
  .nav-brand {
    font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600;
    color: var(--lav-4); letter-spacing: 0.04em; margin-right: auto;
    text-decoration: none; display: flex; align-items: center; gap: 8px;
  }
  .nav-brand-dot::before { content: '✿'; }
  .nav-links { display: flex; gap: 3px; }
  .nav-link {
    display: flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 50px;
    border: 1px solid transparent; background: transparent;
    font-family: 'Nunito', sans-serif; font-size: 0.83rem; font-weight: 500;
    color: var(--text-2); cursor: pointer; transition: all 0.2s;
    text-decoration: none; letter-spacing: 0.01em;
  }
  .nav-link:hover { background: var(--cream-2); color: var(--lav-4); }
  .nav-link.active { background: var(--lav-1); border-color: var(--lav-2); color: var(--lav-4); font-weight: 600; }
  .nav-user {
    display: flex; align-items: center; gap: 7px; margin-left: 12px;
    padding: 4px 12px 4px 4px; background: var(--pink-1); border: 1px solid var(--pink-2);
    border-radius: 50px; cursor: pointer; transition: all 0.18s;
  }
  .nav-user:hover { background: var(--pink-2); }
  .nav-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--pink-3), var(--lav-3));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; font-weight: 700; color: white; flex-shrink: 0;
  }
  .nav-user-name { font-size: 0.78rem; color: var(--pink-4); font-weight: 500; }
  .nav-signout { font-size: 0.68rem; color: var(--text-3); background: none; border: none; cursor: pointer; transition: color 0.15s; }
  .nav-signout:hover { color: var(--pink-4); }

  /* ── PAGE ── */
  .page { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 5px 24px 80px; }

  .page-header { text-align: center; padding: 36px 20px 20px; }
  .page-header h1 {
    font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 300; color: var(--text-1); letter-spacing: 0.08em; text-transform: uppercase;
  }
  .page-header h1 span { color: var(--lav-4); font-style: italic; font-weight: 400; }
  .page-header p { font-size: 0.8rem; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 5px; }
  .header-line { display: flex; align-items: center; gap: 10px; justify-content: center; margin: 14px auto 0; }
  .header-line::before, .header-line::after {
    content: ''; flex: 0 0 40px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--cream-3));
  }
  .header-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--lav-3); }

  /* ── ADD GOAL BUTTON ── */
  .btn-add-goal {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 24px;
    background: linear-gradient(135deg, var(--lav-4), var(--pink-3)); color: white;
    border: none; border-radius: 50px; padding: 11px 22px;
    font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; letter-spacing: 0.03em;
    box-shadow: 0 4px 14px rgba(128,104,208,0.30); transition: transform .2s, box-shadow .2s;
  }
  .btn-add-goal:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(128,104,208,0.38); }
  .btn-add-goal svg { width: 16px; height: 16px; }

  /* ── FILTER BAR ── */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; align-items: center; }
  .filter-pill {
    padding: 6px 16px; border-radius: 50px; border: 1.5px solid var(--cream-3);
    background: transparent; font-family: 'Nunito', sans-serif;
    font-size: 0.78rem; font-weight: 600; cursor: pointer;
    color: var(--text-2); letter-spacing: 0.04em; transition: all .18s;
  }
  .filter-pill:hover { border-color: var(--cream-4); color: var(--text-1); }
  .filter-pill.active { background: var(--lav-4); color: #fff; border-color: var(--lav-4); }
  .filter-pill.cat-personal.active { background: var(--cat-personal); border-color: var(--cat-personal); }
  .filter-pill.cat-work.active     { background: var(--cat-work);     border-color: var(--cat-work); }
  .filter-pill.cat-school.active   { background: var(--cat-school);   border-color: var(--cat-school); }

  /* ── GRID ── */
  .goals-grid { display: grid; grid-template-columns: 1fr; gap: 24px; width: 100%; align-items: start; }
  .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 24px; }
  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { color: var(--text-3); font-size: 0.9rem; }

  /* ══ GOAL CARD ══ */
  .goal-card {
    background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-md);
    overflow: hidden; transition: box-shadow .25s, transform .25s; animation: cardIn .4s ease both;
  }
  .goal-card.personal { background: #ffe4f8; border: 1px solid #ec4899; }
  .goal-card.work     { background: #ede9fe; border: 1px solid #7c3aed; }
  .goal-card.school   { background: #dcfce7; border: 1px solid #22c55e; }
  .goal-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); }
  @keyframes cardIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  /* Card header */
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 20px 20px 14px; }
  .card-title-block { flex: 1; min-width: 0; }
  .card-title {
    font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 600;
    line-height: 1.25; letter-spacing: 0.02em; color: var(--text-1);
  }
  .card-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-dot.personal { background: var(--cat-personal); }
  .cat-dot.work     { background: var(--cat-work); }
  .cat-dot.school   { background: var(--cat-school); }

  .status-badge {
    font-family: 'Nunito', sans-serif; font-size: 0.65rem; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase; padding: 3px 9px; border-radius: 50px;
  }
  .status-badge.not-started { background: var(--cream-2); color: var(--text-3); }
  .status-badge.in-progress  { background: var(--lav-1); color: var(--lav-4); border: 1px solid var(--lav-2); }
  .status-badge.completed    { background: var(--green-1); color: var(--green-5); border: 1px solid var(--green-2); }

  .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .card-icon-btn {
    width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-3); transition: background .18s, color .18s;
  }
  .card-icon-btn:hover { background: var(--cream-2); color: var(--text-1); }
  .card-icon-btn svg { width: 15px; height: 15px; }

  /* Card why */
  .card-why {
    background: rgba(240,236,252,0.5); border-left: 3px solid var(--lav-3);
    margin: 0 16px 14px; border-radius: 8px; padding: 10px 14px;
  }
  .card-why-label {
    font-family: 'Nunito', sans-serif; font-size: 0.62rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase; color: var(--lav-4); margin-bottom: 3px;
  }
  .card-why-text { font-family: 'Nunito', sans-serif; font-size: 0.85rem; color: var(--lav-5); line-height: 1.6; }

  /* Progress */
  .card-progress { padding: 0 16px 14px; }
  .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .progress-label { font-family: 'Nunito', sans-serif; font-size: 0.68rem; font-weight: 700; color: var(--text-3); letter-spacing: .06em; text-transform: uppercase; }
  .progress-pct   { font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 700; color: var(--text-1); }
  .progress-track { height: 6px; background: var(--cream-3); border-radius: 999px; overflow: hidden; }
  .progress-fill  {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--lav-4), var(--pink-3));
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }

  /* Deadline */
  .deadline-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'Nunito', sans-serif; font-size: 0.68rem; font-weight: 600; letter-spacing: .03em;
    padding: 3px 9px; border-radius: 50px; background: var(--cream-2); color: var(--text-3);
    margin: 0 16px 14px; border: 1px solid var(--cream-3);
  }
  .deadline-pill svg { width: 11px; height: 11px; }
  .deadline-pill.urgent { background: var(--pink-1); color: var(--pink-4); border-color: var(--pink-2); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .65; } }

  /* Tasks */
  .card-tasks { padding: 0 16px 16px; }
  .tasks-header {
    font-family: 'Nunito', sans-serif; font-size: 0.65rem; font-weight: 700;
    color: var(--text-3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px;
  }
  .tasks-scroll { max-height: 200px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--cream-3) transparent; }
  .task-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 7px 0; border-bottom: 1px solid var(--cream-3); transition: opacity .2s;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item.done { opacity: .5; }
  .task-item.done .task-label { text-decoration: line-through; color: var(--text-3); }
  .task-check {
    width: 17px; height: 17px; flex-shrink: 0; border: 2px solid var(--cream-3); border-radius: 5px;
    cursor: pointer; appearance: none; -webkit-appearance: none;
    background: #fff; margin-top: 1px; transition: background .18s, border-color .18s; position: relative;
  }
  .task-check:checked { background: linear-gradient(135deg, var(--lav-4), var(--pink-3)); border-color: transparent; }
  .task-check:checked::after {
    content: ''; position: absolute; top: 2px; left: 5px;
    width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg);
  }
  .task-label { font-family: 'Nunito', sans-serif; font-size: 0.82rem; color: var(--text-2); line-height: 1.4; flex: 1; }
  .task-delete-btn {
    opacity: 0; background: none; border: none; cursor: pointer;
    color: var(--text-3); padding: 2px; border-radius: 4px; transition: opacity .18s, color .18s;
  }
  .task-item:hover .task-delete-btn { opacity: 1; }
  .task-delete-btn:hover { color: var(--pink-4); }
  .task-delete-btn svg { width: 12px; height: 12px; display: block; }

  /* Add task */
  .add-task-row { margin-top: 10px; }
  .btn-add-task {
    display: flex; align-items: center; gap: 6px; background: none;
    border: 1.5px dashed var(--cream-3); border-radius: 8px; width: 100%; padding: 8px 12px;
    cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 600;
    color: var(--text-3); letter-spacing: .03em; transition: border-color .18s, color .18s, background .18s;
  }
  .btn-add-task:hover { border-color: var(--cream-4); color: var(--text-1); background: var(--cream-2); }
  .btn-add-task svg { width: 14px; height: 14px; }
  .add-task-input-row { display: none; align-items: center; gap: 8px; margin-top: 8px; }
  .add-task-input-row.open { display: flex; }
  .add-task-input {
    flex: 1; border: 1.5px solid var(--cream-3); border-radius: 8px; padding: 7px 12px;
    font-family: 'Nunito', sans-serif; font-size: 0.82rem;
    background: var(--cream); color: var(--text-1); outline: none; transition: border-color .18s;
  }
  .add-task-input:focus { border-color: var(--lav-3); }
  .btn-confirm-task {
    background: var(--lav-4); color: #fff; border: none; border-radius: 8px;
    padding: 7px 14px; font-family: 'Nunito', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer; flex-shrink: 0; transition: opacity .18s;
  }
  .btn-confirm-task:hover { opacity: .85; }

  /* ── AUTH ── */
  .auth-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: linear-gradient(145deg, rgba(240,236,252,0.95), rgba(252,232,240,0.95));
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px);
  }
  .auth-overlay.hidden { display: none; }
  .auth-card {
    background: var(--white); border-radius: var(--radius-lg); padding: 44px 40px 36px;
    max-width: 380px; width: 90%; box-shadow: var(--shadow-lg); border: 1px solid var(--lav-2);
    animation: authPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes authPop { from { opacity:0; transform:scale(0.88) translateY(16px); } to { opacity:1; transform:scale(1) translateY(0); } }
  .auth-icon {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--pink-2), var(--lav-2));
    display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 1.4rem;
  }
  .auth-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 600; color: var(--lav-4); text-align: center; margin-bottom: 6px; }
  .auth-card p { font-size: 0.82rem; color: var(--text-3); text-align: center; line-height: 1.6; margin-bottom: 28px; }
  .auth-form { display: flex; flex-direction: column; gap: 10px; }
  .auth-input {
    width: 100%; padding: 11px 15px; border-radius: var(--radius-sm); border: 1.5px solid var(--cream-3);
    background: var(--cream); font-family: 'Nunito', sans-serif; font-size: 0.88rem;
    color: var(--text-1); outline: none; transition: border 0.18s;
  }
  .auth-input:focus { border-color: var(--lav-3); background: var(--white); }
  .auth-input::placeholder { color: var(--text-4); }
  .auth-submit-btn {
    width: 100%; padding: 12px; border-radius: var(--radius-sm); border: none;
    background: linear-gradient(135deg, var(--lav-4), var(--pink-3)); color: white;
    font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; box-shadow: 0 4px 14px rgba(128,104,208,0.30); margin-top: 4px;
  }
  .auth-submit-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 20px rgba(128,104,208,0.38); }
  .auth-submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .auth-toggle {
    font-size: 0.78rem; color: var(--text-3); text-align: center; background: none; border: none;
    cursor: pointer; font-family: 'Nunito', sans-serif; transition: color 0.15s; margin-top: 4px;
  }
  .auth-toggle span { color: var(--lav-4); font-weight: 600; }
  .auth-error {
    font-size: 0.76rem; color: var(--pink-4); background: var(--pink-1);
    border: 1px solid var(--pink-2); border-radius: var(--radius-sm);
    padding: 8px 12px; display: none; line-height: 1.45;
  }
  .auth-error.show { display: block; }

  /* ── SYNC BADGE ── */
  .sync-badge {
    position: fixed; bottom: 18px; right: 18px; z-index: 250;
    display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px;
    border-radius: 999px; background: rgba(250,248,244,0.95); border: 1px solid var(--cream-3);
    color: var(--text-3); font-family: 'Nunito', sans-serif; font-size: 0.75rem;
    box-shadow: var(--shadow-sm); opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .sync-badge.show { opacity: 1; pointer-events: auto; }
  .sync-badge.done { color: var(--green-4); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--lav-3); animation: pulseDot 1.2s infinite ease-in-out; }
  .sync-badge.done .sync-dot { animation: none; background: var(--green-4); }
  @keyframes pulseDot { 0%, 100% { opacity:1; } 50% { opacity:.3; } }

  /* ══ MODALS ══ */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(42,34,48,.45);
    backdrop-filter: blur(4px); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
    width: 100%; max-width: 520px; padding: 32px; position: relative; border: 1px solid var(--cream-3);
    transform: translateY(20px) scale(.97); transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-title {
    font-family: 'Cormorant Garamond', serif; font-size: 1.8rem;
    font-weight: 600; color: var(--lav-4); margin-bottom: 20px; letter-spacing: 0.03em;
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--cream-2); border: none; border-radius: 50%;
    width: 32px; height: 32px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-3); transition: background .18s;
  }
  .modal-close:hover { background: var(--cream-3); }
  .modal-close svg { width: 14px; height: 14px; }

  /* Form fields */
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block; font-family: 'Nunito', sans-serif; font-size: 0.68rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%; border: 1.5px solid var(--cream-3); border-radius: var(--radius-sm);
    padding: 10px 14px; font-family: 'Nunito', sans-serif; font-size: 0.88rem;
    background: var(--cream); color: var(--text-1); outline: none; transition: border-color .18s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--lav-3); }
  .form-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Category selector */
  .cat-selector { display: flex; gap: 10px; }
  .cat-option { display: none; }
  .cat-option + label {
    padding: 7px 16px; border-radius: 50px; font-family: 'Nunito', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer;
    border: 2px solid var(--cream-3); color: var(--text-3); transition: all .18s;
  }
  .cat-option:checked + label { color: #fff; border-color: transparent; }

<div class="auth-overlay hidden" id="auth-overlay">

      <button class="auth-submit-btn" id="auth-submit-btn" onclick="handleAuthSubmit()">Sign In</button>

<div class="sync-badge" id="syncBadge"><span class="sync-dot"></span><span id="syncLabel">Saved</span></div>

<script>
const STORE_KEY = 'goals_v1';
function loadGoals() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { return []; } }
function saveGoals(g) { localStorage.setItem(STORE_KEY, JSON.stringify(g)); if (currentUser) saveGoalsToFirestore(); }

const firebaseConfig = {
  apiKey: "AIzaSyDhNIhPG5yOWkk40VMsEGe6WhI_HjjDXxs",
  authDomain: "imthebestdotplannner.firebaseapp.com",
  projectId: "imthebestdotplannner",
  storageBucket: "imthebestdotplannner.firebasestorage.app",
  messagingSenderId: "600432148406",
  appId: "1:600432148406:web:080690db2504b94f918b17"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
let currentUser = null, goalsUnsub = null, authMode = 'signin';

async function saveGoalsToFirestore() {
  if (!currentUser) return;
  try { showSync(false); await db.collection('users').doc(currentUser.uid).collection('planner').doc('goals').set({ goals }); showSync(true); }
  catch (err) { console.error('Goals save error:', err); }
}

let syncTimer = null;
function showSync(done = false) {
  const el = document.getElementById('syncBadge'), label = document.getElementById('syncLabel');
  el.classList.add('show'); el.classList.toggle('done', done); label.textContent = done ? 'Saved' : 'Saving';
  clearTimeout(syncTimer); if (done) syncTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

function setupFirestoreListener(uid) {
  if (goalsUnsub) goalsUnsub();
  goalsUnsub = db.collection('users').doc(uid).collection('planner').doc('goals')
    .onSnapshot(snap => {
      if (snap.exists) { const d = snap.data(); if (Array.isArray(d.goals)) { goals = d.goals; localStorage.setItem(STORE_KEY, JSON.stringify(goals)); } }
      renderAll();
    }, err => console.error('Goals listener:', err));
}

function showAuthError(msg) { const e = document.getElementById('auth-error'); e.textContent = msg; e.classList.add('show'); }
function toggleAuthMode() {
  authMode = authMode === 'signin' ? 'signup' : 'signin'; const s = authMode === 'signup';
  document.getElementById('auth-title').textContent = s ? 'Create Account' : 'Welcome Back';
  document.getElementById('auth-subtitle').textContent = s ? 'Create an account to sync your goals.' : 'Sign in to sync your goals across devices.';
  document.getElementById('auth-submit-btn').textContent = s ? 'Create Account' : 'Sign In';
  document.getElementById('auth-confirm').style.display = s ? '' : 'none';
  document.getElementById('auth-toggle-btn').innerHTML = s ? 'Already have an account? <span>Sign in</span>' : "Don't have an account? <span>Create one</span>";
  document.getElementById('auth-error').classList.remove('show');
}
async function handleAuthSubmit() {
  const email = document.getElementById('auth-email').value.trim(), pw = document.getElementById('auth-password').value, conf = document.getElementById('auth-confirm').value;
  const btn = document.getElementById('auth-submit-btn');
  document.getElementById('auth-error').classList.remove('show');
  if (!email || !pw) { showAuthError('Please enter your email and password.'); return; }
  if (authMode === 'signup' && pw !== conf) { showAuthError("Passwords don't match."); return; }
  if (pw.length < 6) { showAuthError('Password must be at least 6 characters.'); return; }
  btn.disabled = true; btn.textContent = authMode === 'signup' ? 'Creating…' : 'Signing in…';
  try {
    if (authMode === 'signup') await auth.createUserWithEmailAndPassword(email, pw);
    else await auth.signInWithEmailAndPassword(email, pw);
  } catch (err) {
    btn.disabled = false; btn.textContent = authMode === 'signup' ? 'Create Account' : 'Sign In';
    const msgs = { 'auth/user-not-found':'No account found with that email.','auth/wrong-password':'Incorrect password.','auth/email-already-in-use':'An account with this email already exists.','auth/invalid-email':'Please enter a valid email address.','auth/weak-password':'Password is too weak.','auth/too-many-requests':'Too many attempts. Please wait.','auth/invalid-credential':'Incorrect email or password.' };
    showAuthError(msgs[err.code] || `Error: ${err.message}`);
  }
}
function signOut() { if (confirm('Sign out?')) auth.signOut(); }

auth.onAuthStateChanged(user => {
  currentUser = user;
  if (user) {
    document.getElementById('auth-overlay').classList.add('hidden');
    document.getElementById('nav-user').style.display = 'flex';
    document.getElementById('nav-avatar').textContent = (user.email || '?')[0].toUpperCase();
    document.getElementById('nav-name').textContent = user.email?.split('@')[0] || '';
    setupFirestoreListener(user.uid);
  } else {
    document.getElementById('auth-overlay').classList.remove('hidden');
    document.getElementById('nav-user').style.display = 'none';
    renderAll();
  }
});

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

let goals = loadGoals();
let currentFilter = 'all', currentReflectGoalId = null, currentReflectType = 'update';

if (goals.length === 0) {
  goals = [
    { id: genId(), title: 'Launch SaaS MVP', why: 'To prove I can ship a real product and build financial independence outside a 9-5.', deadline: (() => { const d = new Date(); d.setDate(d.getDate() + 2); return d.toISOString().split('T')[0]; })(), status: 'in-progress', category: 'work', tasks: [{ id: genId(), text: 'Design landing page', done: true },{ id: genId(), text: 'Build auth system', done: true },{ id: genId(), text: 'Integrate Stripe', done: false },{ id: genId(), text: 'Write onboarding copy', done: false },{ id: genId(), text: 'Launch on Product Hunt', done: false }], reflections: [{ id: genId(), type: 'win', text: 'Finished the database schema!', date: new Date().toLocaleDateString() }] },
    { id: genId(), title: 'Read 12 Books This Year', why: "Reading is the cheapest mentorship. Each book is a year of someone's experience compressed.", deadline: '2026-12-31', status: 'in-progress', category: 'personal', tasks: [{ id: genId(), text: 'The Lean Startup', done: true },{ id: genId(), text: 'Deep Work', done: true },{ id: genId(), text: 'Zero to One', done: false },{ id: genId(), text: 'The Mom Test', done: false }], reflections: [] },
    { id: genId(), title: 'Ace Algorithm Course', why: "Strong fundamentals will let me solve any problem.", deadline: '2026-06-30', status: 'not-started', category: 'school', tasks: [{ id: genId(), text: 'Complete Week 1 modules', done: false },{ id: genId(), text: 'Solve 10 LeetCode mediums', done: false }], reflections: [] }
  ];
  saveGoals(goals);
}

function getStatus(goal) { const total = goal.tasks.length; if (!total) return goal.status; const done = goal.tasks.filter(t => t.done).length; if (!done) return 'not-started'; if (done === total) return 'completed'; return 'in-progress'; }
function getProgress(goal) { if (!goal.tasks.length) return 0; return Math.round((goal.tasks.filter(t => t.done).length / goal.tasks.length) * 100); }
function getDeadlineInfo(deadline) {
  if (!deadline) return null;
  const now = new Date(); now.setHours(0,0,0,0); const due = new Date(deadline + 'T00:00:00');
  const diff = Math.round((due - now) / 86400000);
  if (diff < 0) return { label: Math.abs(diff) + 'd overdue', urgent: true };
  if (diff === 0) return { label: 'Due today', urgent: true };
  if (diff <= 3) return { label: diff + 'd left', urgent: true };
  return { label: diff + 'd left', urgent: false };
}
function statusLabel(s) { return { 'not-started': 'Not Started', 'in-progress': 'In Progress', 'completed': 'Completed' }[s] || s; }

function renderCard(goal) {
  const status = getStatus(goal), pct = getProgress(goal), dlInfo = getDeadlineInfo(goal.deadline);
  const sortedTasks = [...goal.tasks.filter(t => !t.done), ...goal.tasks.filter(t => t.done)];
  const tasksHTML = sortedTasks.map(t =>
    '<div class="task-item ' + (t.done ? 'done' : '') + '" id="task-' + t.id + '">' +
    '<input type="checkbox" class="task-check" ' + (t.done ? 'checked' : '') + ' onchange="toggleTask(\'' + goal.id + '\',\'' + t.id + '\',this.checked)">' +
    '<span class="task-label">' + escHtml(t.text) + '</span>' +
    '<button class="task-delete-btn" onclick="deleteTask(\'' + goal.id + '\',\'' + t.id + '\')" title="Remove">' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>'
  ).join('');
  const deadlineHTML = dlInfo ?
    '<div class="deadline-pill ' + (dlInfo.urgent ? 'urgent' : '') + '">' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
    dlInfo.label + (goal.deadline ? ' · ' + new Date(goal.deadline + 'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '') + '</div>' : '';

  return '<div class="goal-card ' + goal.category + '" id="card-' + goal.id + '" data-category="' + goal.category + '" data-status="' + status + '">' +
    '<div class="card-header">' +
    '<div class="card-title-block"><div class="card-title">' + escHtml(goal.title) + '</div>' +
    '<div class="card-meta"><div class="cat-dot ' + goal.category + '"></div><span class="status-badge ' + status + '">' + statusLabel(status) + '</span></div></div>' +
    '<div class="card-actions">' +
    '<button class="card-icon-btn" onclick="openReflect(\'' + goal.id + '\')" title="Reflection Log"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></button>' +
    '<button class="card-icon-btn" onclick="deleteGoal(\'' + goal.id + '\')" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>' +
    '</div></div>' +
    (goal.why ? '<div class="card-why"><div class="card-why-label">Why?</div><div class="card-why-text">' + escHtml(goal.why) + '</div></div>' : '') +
    deadlineHTML +
    '<div class="card-progress"><div class="progress-row"><span class="progress-label">Progress</span><span class="progress-pct">' + pct + '%</span></div><div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>' +
    '<div class="card-tasks"><div class="tasks-header">Tasks (' + goal.tasks.filter(t=>t.done).length + '/' + goal.tasks.length + ')</div>' +
    '<div class="tasks-scroll" id="tasks-' + goal.id + '">' + (tasksHTML || '<p style="font-size:0.78rem;color:var(--text-4);padding:4px 0">No tasks yet.</p>') + '</div>' +
    '<div class="add-task-row"><button class="btn-add-task" onclick="openAddTask(\'' + goal.id + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Task</button>' +
    '<div class="add-task-input-row" id="addTaskRow-' + goal.id + '">' +
    '<input class="add-task-input" id="addTaskInput-' + goal.id + '" placeholder="New task..." onkeydown="if(event.key===\'Enter\') confirmTask(\'' + goal.id + '\')">' +
    '<button class="btn-confirm-task" onclick="confirmTask(\'' + goal.id + '\')">Add</button></div></div></div></div>';
}

function renderAll() {
  const grid = document.getElementById('goalsGrid'), empty = document.getElementById('emptyState');
  const filtered = goals.filter(g => {
    const status = getStatus(g);
    if (currentFilter === 'all') return true;
    if (['personal','work','school'].includes(currentFilter)) return g.category === currentFilter;
    return status === currentFilter;
  });
  if (!filtered.length) { grid.innerHTML = ''; grid.appendChild(empty); empty.style.display = 'block'; return; }
  empty.style.display = 'none'; grid.innerHTML = filtered.map(renderCard).join('') + empty.outerHTML;
}

function setFilter(f, btn) { currentFilter = f; document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active')); btn.classList.add('active'); renderAll(); }
function openGoalModal() { document.getElementById('gTitle').value=''; document.getElementById('gWhy').value=''; document.getElementById('gDeadline').value=''; document.getElementById('gStatus').value='not-started'; document.querySelector('#cat-personal').checked=true; openModal('goalModal'); }
function saveGoal() {
  const title = document.getElementById('gTitle').value.trim(); if (!title) { document.getElementById('gTitle').focus(); return; }
  const cat = document.querySelector('input[name="gCat"]:checked')?.value || 'personal';
  goals.push({ id:genId(), title, why:document.getElementById('gWhy').value.trim(), deadline:document.getElementById('gDeadline').value, status:document.getElementById('gStatus').value, category:cat, tasks:[], reflections:[] });
  saveGoals(goals); closeModal('goalModal'); renderAll();
}
function deleteGoal(id) { if (!confirm('Delete this goal?')) return; goals = goals.filter(g => g.id !== id); saveGoals(goals); renderAll(); }
function toggleTask(goalId, taskId, checked) { const g = goals.find(g => g.id === goalId); if (!g) return; const t = g.tasks.find(t => t.id === taskId); if (t) t.done = checked; saveGoals(goals); const card = document.getElementById('card-'+goalId); if (card) card.outerHTML = renderCard(g); }
function deleteTask(goalId, taskId) { const g = goals.find(g => g.id === goalId); if (!g) return; g.tasks = g.tasks.filter(t => t.id !== taskId); saveGoals(goals); const card = document.getElementById('card-'+goalId); if (card) card.outerHTML = renderCard(g); }
function openAddTask(goalId) { const row = document.getElementById('addTaskRow-'+goalId); if (!row) return; row.classList.add('open'); document.getElementById('addTaskInput-'+goalId)?.focus(); }
function confirmTask(goalId) { const inp = document.getElementById('addTaskInput-'+goalId); const text = inp?.value.trim(); if (!text) return; const g = goals.find(g => g.id === goalId); if (!g) return; g.tasks.push({ id:genId(), text, done:false }); saveGoals(goals); const card = document.getElementById('card-'+goalId); if (card) card.outerHTML = renderCard(g); }

function openReflect(goalId) {
  currentReflectGoalId = goalId; currentReflectType = 'update';
  const g = goals.find(g => g.id === goalId);
  document.getElementById('reflectTitle').textContent = g.title + ' — Log';
  document.getElementById('reflectText').value = '';
  document.querySelectorAll('.rtype-btn').forEach(b => b.classList.toggle('active', b.dataset.type === 'update'));
  renderReflections(g); openModal('reflectModal');
}
function renderReflections(g) {
  const el = document.getElementById('reflectEntries');
  if (!g.reflections.length) { el.innerHTML = '<p style="font-size:0.78rem;color:var(--text-4);margin-bottom:12px">No entries yet.</p>'; return; }
  el.innerHTML = [...g.reflections].reverse().map(r =>
    '<div class="reflection-entry"><div class="reflection-entry-date">' + r.date + '</div>' +
    '<span class="reflection-entry-type ' + r.type + '">' + r.type + '</span>' +
    '<div class="reflection-entry-text">' + escHtml(r.text) + '</div></div>'
  ).join('');
}
function setReflectType(type, btn) { currentReflectType = type; document.querySelectorAll('.rtype-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
function saveReflection() {
  const text = document.getElementById('reflectText').value.trim(); if (!text || !currentReflectGoalId) return;
  const g = goals.find(g => g.id === currentReflectGoalId); if (!g) return;
  g.reflections.push({ id:genId(), type:currentReflectType, text, date:new Date().toLocaleDateString() });
  saveGoals(goals); document.getElementById('reflectText').value = ''; renderReflections(g);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => { el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); }); });
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

renderAll();
</script>
</body>
</html>
